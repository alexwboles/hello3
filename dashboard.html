<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentHub Admin Panel - Dashboard</title>
  <link href="styles/custom-styles.css" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <h1 class="logo">AgentHub</h1>
      <nav>
        <ul>
          <li><a href="dashboard.html" class="active">Dashboard</a></li>
          <li><a href="user_management.html">User Management</a></li>
          <li><a href="agent_management.html">Agent Management</a></li>
          <li><a href="skills_catalog.html">Skills</a></li>
          <li><a href="agent_contracts.html">Agent Contracts</a></li>
          <li><a href="error_log.html">Error Log</a></li>
        </ul>
      </nav>
      <button id="darkModeToggle" class="dark-toggle" aria-label="Toggle dark mode">🌙</button>
    </aside>
    <main class="main-content">
      <header class="main-header">
        <h2>Dashboard</h2>
      </header>
      <section class="dashboard-cards">
        <div class="card">Total Revenue: <span>$120,000</span>
          <span class="card-actions">
            <button class="btn edit-card-btn">Edit</button>
            <button class="btn delete-card-btn">Delete</button>
          </span>
        </div>
        <div class="card">Active Agents: <span>14</span>
          <span class="card-actions">
            <button class="btn edit-card-btn">Edit</button>
            <button class="btn delete-card-btn">Delete</button>
          </span>
        </div>
        <div class="card">Failing Agents: <span>2</span>
          <span class="card-actions">
            <button class="btn edit-card-btn">Edit</button>
            <button class="btn delete-card-btn">Delete</button>
          </span>
        </div>
        <button class="btn" id="addCardBtn">Add Card</button>
        <!-- Edit Card Modal -->
        <div id="editCardModal" class="modal hidden">
          <div class="modal-content">
            <span id="closeEditCardModal" class="close">&times;</span>
            <h3>Edit Card</h3>
            <form id="editCardForm">
              <label>Card Name: <input type="text" id="editCardName"></label><br>
              <label>Value: <input type="text" id="editCardValue"></label><br>
              <button type="submit" class="btn">Save</button>
            </form>
          </div>
        </div>
        <!-- Delete Confirmation Modal -->
        <div id="deleteCardModal" class="modal hidden">
          <div class="modal-content">
            <span id="closeDeleteCardModal" class="close">&times;</span>
            <h3>Delete Card</h3>
            <p>Are you sure you want to delete this card?</p>
            <button id="confirmDeleteCard" class="btn">Yes, Delete</button>
            <button id="cancelDeleteCard" class="btn">Cancel</button>
          </div>
        </div>
      </section>
      <section class="dashboard-chart">
        <div class="chart-placeholder">[Weekly Activity Chart]</div>
      </section>
    </main>
  </div>
  <script src="js/agenthub-ui.js"></script>
</body>
</html>
